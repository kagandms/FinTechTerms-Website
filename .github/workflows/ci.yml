name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bootstrap-db-smoke:
    name: Bootstrap DB Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: fintechterms
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d fintechterms"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Apply migrations to a clean bootstrap database
        env:
          BOOTSTRAP_DB_URL: postgresql://postgres:postgres@127.0.0.1:5432/fintechterms
        run: bash scripts/verify-bootstrap-db.sh

  lint-test-build:
    name: Lint, Test & Build
    needs: bootstrap-db-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          npm pkg delete scripts.prepare

      - name: Validate Runtime Environment
        run: npm run validate:runtime-env
        env:
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL || 'https://preview.fintechterms.app' }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || 'validation-service-role-key-0123456789abcdefghijklmnop' }}
          STUDY_SESSION_TOKEN_SECRET: ${{ secrets.STUDY_SESSION_TOKEN_SECRET || 'validation-study-session-secret-0123456789abcdefghijklmnop' }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY || 'validation-openrouter-key-0123456789abcdefghijklmnop' }}
          AI_PRIMARY_MODEL: ${{ secrets.AI_PRIMARY_MODEL || 'mistralai/mistral-small-2603' }}
          AI_FALLBACK_MODELS: ${{ secrets.AI_FALLBACK_MODELS || 'deepseek/deepseek-chat-v3.1,openai/gpt-oss-20b' }}
          ADMIN_USER_IDS: ${{ vars.ADMIN_USER_IDS || '11111111-1111-4111-8111-111111111111' }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL || 'https://redis-validation.fintechterms.dev' }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN || 'validation-upstash-token-0123456789abcdefghijklmnop' }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN || 'https://public-validation-key@o123456.ingest.sentry.io/123456' }}

      - name: Run TypeScript Check
        run: npm run typecheck

      - name: Run ESLint
        run: npm run lint

      - name: Verify SQL Source Guard
        run: npm run verify:sql-sources

      - name: Run Unit Tests
        run: npx jest --ci --runInBand --detectOpenHandles --passWithNoTests

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL || 'https://preview.fintechterms.app' }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || 'validation-service-role-key-0123456789abcdefghijklmnop' }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY || 'validation-openrouter-key-0123456789abcdefghijklmnop' }}
          AI_PRIMARY_MODEL: ${{ secrets.AI_PRIMARY_MODEL || 'mistralai/mistral-small-2603' }}
          AI_FALLBACK_MODELS: ${{ secrets.AI_FALLBACK_MODELS || 'deepseek/deepseek-chat-v3.1,openai/gpt-oss-20b' }}
          ADMIN_USER_IDS: ${{ vars.ADMIN_USER_IDS || '11111111-1111-4111-8111-111111111111' }}
          NEXT_PUBLIC_DEFAULT_LANGUAGE: ${{ vars.NEXT_PUBLIC_DEFAULT_LANGUAGE || 'ru' }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN || 'https://public-validation-key@o123456.ingest.sentry.io/123456' }}
          NEXT_PUBLIC_SENTRY_ENVIRONMENT: ${{ vars.NEXT_PUBLIC_SENTRY_ENVIRONMENT || 'ci' }}
          STUDY_SESSION_TOKEN_SECRET: ${{ secrets.STUDY_SESSION_TOKEN_SECRET || 'validation-study-session-secret-0123456789abcdefghijklmnop' }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL || 'https://redis-validation.fintechterms.dev' }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN || 'validation-upstash-token-0123456789abcdefghijklmnop' }}
          SENTRY_TRACES_SAMPLE_RATE: ${{ vars.SENTRY_TRACES_SAMPLE_RATE || '0.1' }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}

  bot-tests:
    name: Telegram Bot Tests
    needs: bootstrap-db-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: telegram-bot

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest==9.0.2

      - name: Run Python tests
        run: python -m pytest tests/ -v
